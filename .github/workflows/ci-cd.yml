name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Check, Build, and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.12'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Package prebuilt installer artifact
        run: npm run pack:release

      - name: Smoke test packaged CLI
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          tar -xzf artifacts/mr.tar.gz -C "$tmp_dir"
          "$tmp_dir/mr/dist/index.js" --version

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: mr
          path: |
            artifacts/mr.tar.gz
            artifacts/mr.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download package artifact
        uses: actions/download-artifact@v8
        with:
          name: mr
          path: artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/mr.tar.gz artifacts/mr.sha256 --clobber
          else
            gh release create "$TAG_NAME" artifacts/mr.tar.gz artifacts/mr.sha256 \
              --title "$TAG_NAME" \
              --notes "Prebuilt mr package."
          fi
